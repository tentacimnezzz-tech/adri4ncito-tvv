<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADRI4NCITO TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow-x: hidden;
        }

        /* Header */
        header {
            background: #0a0e27;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #9333ea, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-icons {
            display: flex;
            gap: 16px;
            font-size: 20px;
        }

        /* Search Bar */
        .search-bar {
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px;
            border-radius: 50px;
        }

        .search-bar input {
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            flex: 1;
            outline: none;
        }

        .search-bar input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        /* Tabs */
        .tabs {
            display: flex;
            padding: 0 16px;
            gap: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow-x: auto;
            scroll-behavior: smooth;
        }

        .tab {
            padding: 16px 0;
            border: none;
            background: none;
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab.active {
            color: #fff;
            border-bottom-color: #5b21b6;
        }

        /* Carousel */
        .carousel {
            position: relative;
            height: 300px;
            overflow: hidden;
            margin-bottom: 30px;
            margin: 16px;
            border-radius: 12px;
        }

        .carousel-item {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #5b21b6, #ec4899);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border-radius: 12px;
        }

        .carousel-item.active {
            display: flex;
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.3s;
        }

        .dot.active {
            background: #fff;
            width: 24px;
            border-radius: 4px;
        }

        /* Main Container */
        .container {
            padding: 0 0 100px 0;
        }

        /* Section */
        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
        }

        .section-more {
            font-size: 24px;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
        }

        /* Grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            padding: 0 12px;
        }

        .movie-card {
            cursor: pointer;
            transition: transform 0.3s, filter 0.3s;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .movie-card:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #5b21b6, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border-radius: 8px;
            position: relative;
        }

        .movie-title {
            font-size: 12px;
            margin-top: 8px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-align: center;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: 100%;
            background: #0a0e27;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .modal-video iframe {
            width: 100%;
            height: 100%;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .modal-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .modal-description {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.8);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(90deg, #9333ea, #ec4899);
            color: #fff;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0a0e27;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-item.active {
            color: #5b21b6;
        }

        .nav-icon {
            font-size: 24px;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
            font-size: 16px;
        }

        @media (max-width: 640px) {
            .carousel {
                height: 200px;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }

            .section-title {
                font-size: 18px;
            }
        }
    </style>
</head>

        const genres = ["Recomendado", "Acción", "Terror", "Drama", "Thriller", "Deportes"];
        let currentCarouselIndex = 0;

        function init() {
            renderTabs();
            renderCarousel();
            renderMovies();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabsContainer');
            tabsContainer.innerHTML = genres.map((genre, i) => `
                <button class="tab ${i === 0 ? 'active' : ''}" onclick="filterByGenre('${genre}', this)">
                    ${genre}
                </button>
            `).join('');
        }

        function renderCarousel() {
            const carousel = document.getElementById('carousel');
            const dots = document.getElementById('dots');
            
            const carouselItems = movies.slice(0, 4);
            carousel.innerHTML = carouselItems.map((m, i) => `
                <div class="carousel-item ${i === 0 ? 'active' : ''}" style="background: linear-gradient(135deg, #5b21b6, #ec4899); font-size: 80px;">
                    ${m.poster}
                </div>
            `).join('');

            dots.innerHTML = carouselItems.map((_, i) => `
                <div class="dot ${i === 0 ? 'active' : ''}" onclick="changeCarousel(${i})"></div>
            `).join('');

            setInterval(() => {
                currentCarouselIndex = (currentCarouselIndex + 1) % carouselItems.length;
                changeCarousel(currentCarouselIndex);
            }, 5000);
        }

        function changeCarousel(index) {
            currentCarouselIndex = index;
            document.querySelectorAll('.carousel-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function renderMovies(moviesToRender = movies) {
            const container = document.getElementById('mainContainer');
            
            if (moviesToRender.length === 0) {
                container.innerHTML = '<div class="no-results">No se encontraron películas</div>';
                return;
            }

            const sections = {
                'Superados': moviesToRender.slice(0, 3),
                'Nuevos': moviesToRender.slice(3, 11),
                'Populares': moviesToRender.slice(11, 20),
                'Recomendados': moviesToRender.slice(20, 28)
            };

            container.innerHTML = Object.entries(sections).map(([title, items]) => `
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">${title}</div>
                        <div class="section-more">⋯</div>
                    </div>
                    <div class="movies-grid">
                        ${items.map(movie => `
                            <div onclick="openModal(${movie.id})">
                                <div class="movie-card">
                                    <div class="movie-poster">${movie.poster}</div>
                                    <div class="movie-title">${movie.title}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function filterByGenre(genre, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');

            if (genre === 'Recomendado') {
                renderMovies(movies);
            } else {
                const filtered = movies.filter(m => m.genre.includes(genre));
                renderMovies(filtered);
            }
        }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            if (!term) {
                renderMovies(movies);
                return;
            }
            const filtered = movies.filter(m => m.title.toLowerCase().includes(term));
            renderMovies(filtered);
        }

        function openModal(movieId) {
            const movie = movies.find(m => m.id === movieId);
            if (!movie) return;

            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalYear').textContent = `${movie.year}`;
            document.getElementById('modalGenre').textContent = movie.genre;
            document.getElementById('modalRating').textContent = `⭐ ${movie.rating}`;
            document.getElementById('modalDescription').textContent = movie.description;
            document.getElementById('modalVideo').innerHTML = `
                <iframe src="https://www.dailymotion.com/embed/video/${movie.dailymotionId}" allow="autoplay; encrypted-media"></iframe>
            `;
            
            document.getElementById('modal').classList.add('active');
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });

        function activeNav(index) {
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        init();
    </script>
</body>
</html>
